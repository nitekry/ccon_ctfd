// ============================================================
// TERMINAL ENGINE
// ============================================================

const ENV = {
  USER: 'ctf-user',
  HOME: '/home/ctf-user',
  PATH: '/usr/local/bin:/usr/bin:/bin',
  SHELL: '/bin/bash',
  TERM: 'xterm-256color',
  FLAG8: _d("XG5qPD0FClFvREMSOhMdfHpIUQ=="),
  CTF_LEVEL: '1',
  HOSTNAME: 'linux-challenges',
  PWD: '/home/ctf-user',
  LANG: 'en_US.UTF-8',
};

let cwd = '/home/ctf-user';
let history = [];
let historyIdx = -1;
let solvedFlags = new Set();
let currentChallenge = null;

const CHALLENGES = [
  { id: 1,  name: 'Basic Cat',          title: 'Challenge 1',  flag: 1,  startDir: '/home/ctf-user' },
  { id: 2,  name: 'Hidden Files',       title: 'Challenge 2',  flag: 2,  startDir: '/home/ctf-user' },
  { id: 3,  name: 'Dir Navigation',     title: 'Challenge 3',  flag: 3,  startDir: '/home/ctf-user' },

// ============================================================
// FILESYSTEM HELPERS
// ============================================================

function resolvePath(path) {
  if (!path || path === '~') return ENV.HOME;
  if (path.startsWith('~/')) path = ENV.HOME + path.slice(1);
  if (!path.startsWith('/')) path = cwd + '/' + path;
  const parts = path.split('/').filter(Boolean);
  const resolved = [];
  for (const p of parts) {
    if (p === '.') continue;
    if (p === '..') { resolved.pop(); continue; }
    resolved.push(p);
  }
  return '/' + resolved.join('/');
}

function getNode(path) {
  const abs = resolvePath(path);
  if (abs === '/') return _fs;
  const parts = abs.split('/').filter(Boolean);
  let node = _fs;
  for (const p of parts) {
    if (!node || node.type !== 'dir' || !node.children) return null;
    node = node.children[p];
  }
  return node || null;
}

function listDir(path, showHidden) {
  const node = getNode(path);
  if (!node) return { error: 'ls: cannot access \'' + path + '\': No such file or directory' };
  if (node.type !== 'dir') return { error: 'ls: ' + path + ': Not a directory' };
  const entries = Object.entries(node.children || {})
    .filter(([name]) => showHidden || !name.startsWith('.'))
    .map(([name, n]) => ({ name, ...n }));
  return { entries };
}

function cwdDisplay() {
  if (cwd === ENV.HOME) return '~';
  if (cwd.startsWith(ENV.HOME + '/')) return '~' + cwd.slice(ENV.HOME.length);
  return cwd;
}

function promptStr() {
  return `ctf-user@linux:${cwdDisplay()}$`;
}

// ============================================================
// COMMANDS
// ============================================================

function cmdLs(args) {
  let showHidden = false, longFormat = false, target = '.';
  for (const a of args) {
    if (a.startsWith('-')) {
      if (a.includes('a')) showHidden = true;
      if (a.includes('l')) longFormat = true;
    } else {
      target = a;
    }
  }

  const absTarget = resolvePath(target);
  const result = listDir(absTarget, showHidden);
  if (result.error) return [{ text: result.error, cls: 'error' }];

  if (result.entries.length === 0) return [];

  if (longFormat) {
    const lines = [{ text: 'total ' + result.entries.length, cls: 'output' }];
    for (const e of result.entries) {
      const isDir = e.type === 'dir';
      const perms = e.perms || (isDir ? '755' : '644');
      const typeChar = isDir ? 'd' : '-';
      const pStr = typeChar + fmtPerms(perms);
      const owner = e.owner || 'ctf-user';
      const size = isDir ? 4096 : (e.content ? e.content.length : 0);
      const cls = isDir ? 'dir' : (perms.includes('7') ? 'exec' : 'output');
      lines.push({ text: `${pStr} 1 ${owner} ${owner} ${String(size).padStart(8)} Jan  1 00:00 ${e.name}`, cls });
    }
    return lines;
  } else {
    const names = result.entries.map(e => {
      return { text: e.name + (e.type === 'dir' ? '/' : ''), cls: e.type === 'dir' ? 'dir' : (e.perms && e.perms.includes('7') ? 'exec' : 'output') };
    });
    // arrange in columns
    const maxLen = Math.max(...names.map(n => n.text.length)) + 2;
    const cols = Math.max(1, Math.floor(80 / maxLen));
    const lines = [];
    for (let i = 0; i < names.length; i += cols) {
      const row = names.slice(i, i + cols);
      const text = row.map(n => n.text.padEnd(maxLen)).join('');
      lines.push({ text: text.trimEnd(), cls: 'output', multicolor: row });
    }
    return lines;
  }
}

function fmtPerms(p) {
  const d = parseInt(p, 8) || 0;
  const bits = ['r','w','x'];
  let s = '';
  for (let i = 6; i >= 0; i -= 3) s += bits.map((b,j) => (d >> (i + 2 - j)) & 1 ? b : '-').join('');
  return s.length === 9 ? s : 'rwxr-xr-x';
}

function cmdCd(args) {
  let target = args[0] || ENV.HOME;
  if (target === '-') return [{ text: 'cd: OLDPWD not set', cls: 'error' }];
  const abs = resolvePath(target);
  const node = getNode(abs);
  if (!node) return [{ text: `bash: cd: ${target}: No such file or directory`, cls: 'error' }];
  if (node.type !== 'dir') return [{ text: `bash: cd: ${target}: Not a directory`, cls: 'error' }];
  if (node.owner === 'root' && node.perms === '700') return [{ text: `bash: cd: ${target}: Permission denied`, cls: 'error' }];
  cwd = abs;
  ENV.PWD = abs;
  return [];
}

function cmdCat(args) {
  if (args.length === 0) return [{ text: 'cat: missing operand', cls: 'error' }];
  const results = [];
  for (const arg of args) {
    if (arg.startsWith('-') && arg !== '-') continue; // skip flags for simplicity
    const abs = resolvePath(arg);
    const node = getNode(abs);
    if (!node) { results.push({ text: `cat: ${arg}: No such file or directory`, cls: 'error' }); continue; }
    if (node.type === 'dir') { results.push({ text: `cat: ${arg}: Is a directory`, cls: 'error' }); continue; }
    if (node.owner === 'root') { results.push({ text: `cat: ${arg}: Permission denied`, cls: 'error' }); continue; }
    if (node.binary) {
      // show strings-like output for binary
      const content = node.content || '';
      const printable = content.replace(/[^\x20-\x7E\n]/g, '.');
      results.push({ text: printable, cls: 'output' });
    } else {
      const lines = (node.content || '').split('\n');
      for (const line of lines) {
        const isFlagLine = node.flag && (line.includes('CTF{') || line.includes('CTF_FLAG'));
        results.push({ text: line, cls: isFlagLine ? 'flag' : 'output' });
      }
    }
    if (node.flag) checkFlag(node.flag);
  }
  return results;
}

function cmdPwd() {
  return [{ text: cwd, cls: 'output' }];
}

function cmdEcho(args) {
  // handle -e, -n flags simply
  let text = args.filter(a => !a.startsWith('-')).join(' ');
  // variable expansion
  text = text.replace(/\$(\w+)/g, (_, v) => ENV[v] !== undefined ? ENV[v] : '');
  text = text.replace(/\$\{(\w+)\}/g, (_, v) => ENV[v] !== undefined ? ENV[v] : '');
  return [{ text, cls: 'output' }];
}

function cmdGrep(args) {
  if (args.length < 1) return [{ text: 'Usage: grep [OPTION] PATTERN [FILE...]', cls: 'error' }];
  let pattern = '', files = [], ignoreCase = false, lineNum = false, recursive = false;
  let nextIsPattern = true;
  for (const a of args) {
    if (a.startsWith('-')) {
      if (a.includes('i')) ignoreCase = true;
      if (a.includes('n')) lineNum = true;
      if (a.includes('r') || a.includes('R')) recursive = true;
    } else if (nextIsPattern) {
      pattern = a;
      nextIsPattern = false;
    } else {
      files.push(a);
    }
  }

  if (files.length === 0) return [{ text: 'grep: no files specified (this emulator doesn\'t support stdin piping directly — use grep PATTERN FILE)', cls: 'error' }];

  const results = [];
  const tryFile = (filePath, displayPath) => {
    const abs = resolvePath(filePath);
    const node = getNode(abs);
    if (!node) { results.push({ text: `grep: ${filePath}: No such file or directory`, cls: 'error' }); return; }
    if (node.type === 'dir') {
      if (recursive) {
        for (const child of Object.keys(node.children || {})) {
          tryFile(filePath + '/' + child, displayPath + '/' + child);
        }
      } else {
        results.push({ text: `grep: ${filePath}: Is a directory`, cls: 'error' });
      }
      return;
    }
    const content = node.content || '';
    const lines = content.split('\n');
    const re = new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), ignoreCase ? 'i' : '');
    lines.forEach((line, idx) => {
      if (re.test(line)) {
        const prefix = files.length > 1 ? displayPath + ':' : '';
        const numPrefix = lineNum ? (idx + 1) + ':' : '';
        const isFlagLine = node.flag && line.includes('CTF');
        results.push({ text: prefix + numPrefix + line, cls: isFlagLine ? 'flag' : 'output' });
        if (node.flag) checkFlag(node.flag);
      }
    });
  };

  for (const f of files) {
    if (f === '2>/dev/null') continue;
    tryFile(f, f);
  }
  return results;
}

function cmdFind(args) {
  let startPath = '.';
  let namePattern = null;
  let typeFilter = null;
  const results = [];

  for (let i = 0; i < args.length; i++) {
    if (args[i] === '-name' && args[i+1]) { namePattern = args[++i]; }
    else if (args[i] === '-type' && args[i+1]) { typeFilter = args[++i]; }
    else if (!args[i].startsWith('-')) { startPath = args[i]; }
  }

  function walk(path, node) {
    if (!node) return;
    const name = path.split('/').pop() || '/';
    let matches = true;
    if (namePattern) {
      const re = new RegExp('^' + namePattern.replace(/\./g,'[.]').replace(/\*/g,'.*').replace(/\?/g,'.') + '$');
      if (!re.test(name)) matches = false;
    }
    if (typeFilter) {
      if (typeFilter === 'f' && node.type !== 'file') matches = false;
      if (typeFilter === 'd' && node.type !== 'dir') matches = false;
    }
    if (matches && path !== resolvePath(startPath)) {
      const cls = node.type === 'dir' ? 'dir' : (node.flag ? 'flag' : 'output');
      results.push({ text: path, cls });
      if (node.flag) checkFlag(node.flag);
    }
    if (node.type === 'dir' && node.children) {
      for (const [child, childNode] of Object.entries(node.children)) {
        walk(path.replace(/\/$/, '') + '/' + child, childNode);
      }
    }
  }

  const abs = resolvePath(startPath);
  const startNode = getNode(abs);
  if (!startNode) return [{ text: `find: '${startPath}': No such file or directory`, cls: 'error' }];
  walk(abs, startNode);
  return results.length ? results : [];
}

function cmdBase64(args) {
  let decode = false;
  let file = null;
  for (const a of args) {
    if (a === '-d' || a === '--decode') decode = true;
    else if (!a.startsWith('-')) file = a;
  }
  if (!file) return [{ text: 'Usage: base64 [-d] FILE', cls: 'error' }];
  const abs = resolvePath(file);
  const node = getNode(abs);
  if (!node) return [{ text: `base64: ${file}: No such file or directory`, cls: 'error' }];
  if (node.type === 'dir') return [{ text: `base64: ${file}: Is a directory`, cls: 'error' }];
  const content = (node.content || '').trim();
  try {
    if (decode) {
      const decoded = atob(content);
      if (node.flag) checkFlag(node.flag);
      return [{ text: decoded, cls: 'flag' }];
    } else {
      return [{ text: btoa(content), cls: 'output' }];
    }
  } catch(e) {
    return [{ text: 'base64: invalid input', cls: 'error' }];
  }
}

function cmdStrings(args) {
  const results = [];
  for (const a of args) {
    if (a.startsWith('-')) continue;
    const abs = resolvePath(a);
    const node = getNode(abs);
    if (!node) { results.push({ text: `strings: ${a}: No such file or directory`, cls: 'error' }); continue; }
    if (node.type === 'dir') { results.push({ text: `strings: ${a}: Is a directory`, cls: 'error' }); continue; }
    const content = node.content || '';
    // Extract printable sequences of 4+ chars
    const matches = content.match(/[\x20-\x7E]{4,}/g) || [];
    for (const m of matches) {
      const isFlagLine = m.includes('CTF{');
      results.push({ text: m, cls: isFlagLine ? 'flag' : 'output' });
    }
    if (node.flag) checkFlag(node.flag);
  }
  return results;
}

function cmdHead(args) {
  let n = 10; let file = null;
  for (let i = 0; i < args.length; i++) {

  if (!file) return [{ text: 'head: missing operand', cls: 'error' }];
  const abs = resolvePath(file);
  const node = getNode(abs);
  if (!node) return [{ text: `head: cannot open '${file}': No such file or directory`, cls: 'error' }];
  return (node.content || '').split('\n').slice(0, n).map(l => ({ text: l, cls: 'output' }));
}

function cmdTail(args) {

function cmdWc(args) {

function executeWithPipes(cmdStr) {
  const parts = cmdStr.split('|').map(s => s.trim()).filter(Boolean);
  if (parts.length === 1) return executeCommand(parts[0]);

  // Execute first command, then pipe output through grep/base64/wc/strings
  let lines = executeCommand(parts[0]);
  for (let i = 1; i < parts.length; i++) {
    const pipeCmd = parts[i].split(/\s+/);
    const pipeName = pipeCmd[0];
    const pipeArgs = pipeCmd.slice(1);
    const textLines = lines.map(l => l.text);

    if (pipeName === 'grep') {
      const pattern = pipeArgs.find(a => !a.startsWith('-')) || '';
      const ignoreCase = pipeArgs.some(a => a.includes('i'));
      const re = new RegExp(pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), ignoreCase ? 'gi' : 'g');
      lines = textLines.filter(l => re.test(l)).map(l => {
        const isFlag = l.includes('CTF{') || l.includes('CTF_FLAG');
        return { text: l, cls: isFlag ? 'flag' : 'output' };
      });
      // Check flags in pipe output
      for (const l of lines) {
        if (l.text.match(/CTF\{[^}]+\}/)) {
          const m = l.text.match(/CTF\{[^}]+\}/);
          checkFlagByValue(m[0]);
        }
      }
    } else if (pipeName === 'base64' && pipeArgs.includes('-d')) {
      const decoded = textLines.map(l => { try { return atob(l.trim()); } catch(e) { return l; } });
      lines = decoded.map(l => ({ text: l, cls: l.includes('CTF{') ? 'flag' : 'output' }));
      for (const l of lines) {
        if (l.text.includes('CTF{')) {
          const m = l.text.match(/CTF\{[^}]+\}/);
          if (m) checkFlagByValue(m[0]);
        }
      }
    } else if (pipeName === 'wc') {
      const allText = textLines.join('\n');
      const lc = textLines.length;
      const wc = allText.trim().split(/\s+/).filter(Boolean).length;
      const bc = allText.length;
      lines = [{ text: `${String(lc).padStart(7)} ${String(wc).padStart(7)} ${String(bc).padStart(7)}`, cls: 'output' }];
    } else if (pipeName === 'head') {
      const n = parseInt(pipeArgs.find(a => /^\d+$/.test(a)) || '10');
      lines = lines.slice(0, n);
    } else if (pipeName === 'tail') {
      const n = parseInt(pipeArgs.find(a => /^\d+$/.test(a)) || '10');
      lines = lines.slice(-n);
    } else if (pipeName === 'sort') {
      lines = [...lines].sort((a, b) => a.text.localeCompare(b.text));
    } else if (pipeName === 'uniq') {
      const seen = new Set();
      lines = lines.filter(l => { if (seen.has(l.text)) return false; seen.add(l.text); return true; });
    } else if (pipeName === 'strings') {
      const allText = textLines.join('\n');
      const matches = allText.match(/[\x20-\x7E]{4,}/g) || [];
      lines = matches.map(m => ({ text: m, cls: m.includes('CTF{') ? 'flag' : 'output' }));
    } else {
      lines.push({ text: `bash: ${pipeName}: command not found`, cls: 'error' });
    }
  }
  return lines;
}

function checkFlagByValue(flagVal) {
  for (const ch of CHALLENGES) {
    const expected = _d(["XG5qPC8OEG12SFQSJgksfHdfczM9GRFnd0RdMA==","XG5qPDwOGXxGVVQiIgoWdQ==","XG5qPDwKCms+Vm4jPRIsYHpISTo=","XG5qPD8ZGX5GSFA+JgMBVy4JH3Al","XG5qPDoKD2svEW4pNwUcbHpIczcqBAE=","XG5qPD4CEmpGRl4gPwcdbEBfVDc9GQhz","XG5qPCsfDmd3QkISNQksam1IXjUl","XG5qPD0FClFvREMSOhMdfHpIUQ==","XG5qPCgCDGtGRF8pDRQWbHZISSQsFg==","XG5qPCgODmNwVkIkPQgsbHpURSI8NBJhbVg="][ch.id - 1]);
    if (flagVal === expected) { checkFlag(ch.id); return; }
  }
}

function executeCommand(cmdStr) {
  // Handle 2>/dev/null redirect (just ignore it)
  cmdStr = cmdStr.replace(/\s*2>\/dev\/null\s*/, ' ').trim();

  const tokens = parseArgs(cmdStr);
  if (!tokens.length) return [];
  const cmd = tokens[0].toLowerCase();
  const args = tokens.slice(1);

  switch(cmd) {
    case 'ls': return cmdLs(args);
    case 'cd': return cmdCd(args);
    case 'cat': return cmdCat(args);
    case 'pwd': return cmdPwd();
    case 'echo': return cmdEcho(args);
    case 'grep': return cmdGrep(args);
    case 'find': return cmdFind(args);
    case 'base64': return cmdBase64(args);
    case 'strings': return cmdStrings(args);
    case 'env': return cmdEnv(args);
    case 'printenv': return cmdPrintenv(args);
    case 'whoami': return cmdWhoami();
    case 'id': return cmdId();
    case 'hostname': return cmdHostname();
    case 'uname': return cmdUname(args);
    case 'date': return cmdDate();
    case 'history': return cmdHistory();
    case 'file': return cmdFile(args);
    case 'head': return cmdHead(args);
    case 'tail': return cmdTail(args);
    case 'wc': return cmdWc(args);
    case 'sudo': return cmdSudo(args);
    case 'su': return cmdSu(args);
    case 'chmod': return cmdChmod(args);
    case 'chown': return cmdChown(args);
    case 'man': return cmdMan(args);
    case 'help': return cmdHelp();
    case 'clear': clearTerminal(); return [];
    case 'reset': return cmdReset();
    case 'exit': return [{ text: 'Type "reset" to reset, or select a challenge above.', cls: 'warning' }];
    case 'bash': case 'sh': return [{ text: 'Already in a shell session.', cls: 'output' }];
    case 'python': case 'python3': return [{ text: 'Python is not available in this environment.', cls: 'error' }];
    case 'vim': case 'nano': case 'emacs': return [{ text: `${cmd}: terminal editors not supported in this environment.`, cls: 'error' }];
    case 'score': return showScore();
    case 'flags': return showSolvedFlags();
    default: return [{ text: `bash: ${cmd}: command not found`, cls: 'error' }];
  }
}

function parseArgs(cmd) {
  const tokens = [];
  let current = '';
  let inSingle = false, inDouble = false;
  for (let i = 0; i < cmd.length; i++) {
    const c = cmd[i];
    if (c === "'" && !inDouble) { inSingle = !inSingle; }
    else if (c === '"' && !inSingle) { inDouble = !inDouble; }
    else if (c === ' ' && !inSingle && !inDouble) {
      if (current) { tokens.push(current); current = ''; }
    } else {
      current += c;
    }
  }
  if (current) tokens.push(current);
  return tokens;
}

function showScore() {
  return [
    { text: `Solved: ${solvedFlags.size} / ${CHALLENGES.length} challenges`, cls: 'output' },
  ];
}

function showSolvedFlags() {
  if (solvedFlags.size === 0) return [{ text: 'No flags found yet. Keep trying!', cls: 'warning' }];
  const lines = [{ text: 'Flags captured:', cls: 'success' }];
  for (const fid of [...solvedFlags].sort((a,b)=>a-b)) {
    const ch = CHALLENGES.find(c => c.id === fid);
    lines.push({ text: `  ✓ Challenge ${fid}: ${ch ? ch.title : 'Unknown'}`, cls: 'success' });
  }
  return lines;
}

function checkFlag(flagId) {
  if (solvedFlags.has(flagId)) return;
  solvedFlags.add(flagId);
  updateChallengeBtns();

  // Mark the active challenge solved if it matches
  if (currentChallenge && currentChallenge.flag === flagId) {
    setTimeout(() => {
      appendLines([
        { text: '', cls: 'output' },
        { text: '🏁 ═══════════════════════════════════════════', cls: 'success' },
        { text: `   CHALLENGE ${flagId} COMPLETE!`, cls: 'success' },
        { text: '   ═══════════════════════════════════════════', cls: 'success' },
        { text: '', cls: 'output' },
      ]);
    }, 100);
  }
}

const terminal = document.getElementById('terminal');
const input = document.getElementById('cmd-input');
const promptEl = document.getElementById('prompt-prefix');

function clearTerminal() {
  terminal.innerHTML = '';
}

function appendLines(lines) {
  for (const line of lines) {
    const div = document.createElement('div');
    div.className = 'line ' + (line.cls || 'output');
    div.textContent = line.text;
    terminal.appendChild(div);
  }
  terminal.scrollTop = terminal.scrollHeight;
}

function appendPromptLine(cmd) {
  const div = document.createElement('div');
  div.className = 'line prompt-line';
  div.innerHTML = `<span class="prompt-span">${escHtml(promptStr())}</span> <span>${escHtml(cmd)}</span>`;
  terminal.appendChild(div);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updatePrompt() {
  promptEl.textContent = promptStr() + ' ';
}

function updateChallengeBtns() {
  document.querySelectorAll('.challenge-btn').forEach(btn => {
    const id = parseInt(btn.dataset.id);
    btn.classList.remove('active', 'solved');
    if (solvedFlags.has(id)) btn.classList.add('solved');
    if (currentChallenge && currentChallenge.id === id) btn.classList.add('active');
  });
}

function loadChallenge(ch) {
  currentChallenge = ch;
  cwd = ch.startDir;
  ENV.PWD = cwd;
  clearTerminal();
  updatePrompt();
  updateChallengeBtns();

  const panel = document.getElementById('info-panel');
  panel.innerHTML = `<div class="challenge-title">${escHtml(ch.title)}</div>`;

  appendLines([
    { text: `╔${'═'.repeat(50)}╗`, cls: 'info' },
    { text: `║  ${ch.title.padEnd(48)} ║`, cls: 'info' },
    { text: `╚${'═'.repeat(50)}╝`, cls: 'info' },
    { text: '', cls: 'output' },
    { text: 'Type "help" for available commands.', cls: 'info' },
    { text: '', cls: 'output' },
  ]);
}

// Tab completion
function tabComplete(partial) {
  const tokens = partial.split(/\s+/);
  if (tokens.length <= 1) {
    // Complete command name
    const cmds = ['ls','cd','cat','pwd','echo','grep','find','base64','strings','env','printenv','whoami','id','hostname','uname','date','history','file','head','tail','wc','sudo','man','help','clear','reset','score','flags'];
    const matches = cmds.filter(c => c.startsWith(tokens[0]));
    if (matches.length === 1) return matches[0] + ' ';
    if (matches.length > 1) { appendLines([{ text: matches.join('  '), cls: 'output' }]); return partial; }
    return partial;
  }
  // Complete file/dir
  const lastToken = tokens[tokens.length - 1];
  const slashIdx = lastToken.lastIndexOf('/');
  const dirPart = slashIdx >= 0 ? lastToken.slice(0, slashIdx + 1) : '';
  const filePart = lastToken.slice(slashIdx + 1);
  const targetDir = dirPart ? resolvePath(dirPart) : cwd;
  const node = getNode(targetDir);
  if (!node || node.type !== 'dir') return partial;
  const matches = Object.keys(node.children || {}).filter(n => n.startsWith(filePart));
  if (matches.length === 1) {
    const completed = dirPart + matches[0];
    const childNode = node.children[matches[0]];
    return tokens.slice(0, -1).join(' ') + ' ' + completed + (childNode && childNode.type === 'dir' ? '/' : ' ');
  }
  if (matches.length > 1) {
    appendLines([{ text: matches.join('  '), cls: 'output' }]);
  }
  return partial;
}

// Setup challenge buttons

  btn.className = 'challenge-btn';

}

// Input handling
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    input.value = '';
    if (cmd) { history.push(cmd); historyIdx = history.length; }
    appendPromptLine(cmd);
    if (cmd) {
      const output = executeWithPipes(cmd);
      appendLines(output);
    }
    updatePrompt();
    terminal.scrollTop = terminal.scrollHeight;
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIdx > 0) { historyIdx--; input.value = history[historyIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIdx < history.length - 1) { historyIdx++; input.value = history[historyIdx]; }
    else { historyIdx = history.length; input.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    input.value = tabComplete(input.value);
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    clearTerminal();
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    appendPromptLine(input.value + '^C');
    input.value = '';
    updatePrompt();
  }
});
