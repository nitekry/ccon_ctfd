{% extends "base.html" %}

{% block title %}{{ title }} | {{ get_config("ctf_name") }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-10">
        {% if title %}
        <h2 class="mb-4 text-glow">{{ title | upper }}</h2>
        {% endif %}
        <div class="card">
            <div class="card-body">
                {{ content | safe }}
            </div>
        </div>
    </div>
</div>
{% endblock %}
